services:
  backendfastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backendfastapi
    hostname: backendfastapi
    env_file:
      - ../.env.shared
      - env/.env.local
    ports:
      - "8000:8000"   # FastAPI HTTP
      - "50052:50052" # gRPC (internal + optional local tooling)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shared-monitor-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  shared-monitor-net:
    external: true
